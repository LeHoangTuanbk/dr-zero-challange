<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" fill="none">
  <rect width="32" height="32" rx="8" fill="#5a864d"/>
  <!-- Leaf body: pointed top, rounded sides, stem at bottom -->
  <path d="M16 4 C16 4, 8 10, 8 17 C8 22, 11.5 26, 16 26 C20.5 26, 24 22, 24 17 C24 10, 16 4, 16 4Z" fill="white"/>
  <!-- Center vein -->
  <line x1="16" y1="26" x2="16" y2="10" stroke="#5a864d" stroke-width="1.2" stroke-linecap="round"/>
  <!-- Left veins -->
  <line x1="16" y1="17" x2="10.5" y2="13.5" stroke="#5a864d" stroke-width="0.8" stroke-linecap="round" opacity="0.7"/>
  <line x1="16" y1="21" x2="10" y2="18" stroke="#5a864d" stroke-width="0.8" stroke-linecap="round" opacity="0.7"/>
  <!-- Stem -->
  <line x1="16" y1="26" x2="16" y2="29" stroke="white" stroke-width="1.5" stroke-linecap="round"/>
</svg>
